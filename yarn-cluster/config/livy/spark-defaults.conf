spark.master                            yarn
spark.submit.deployMode                 client

# Event log — required for Spark History Server and governance
spark.eventLog.enabled                  true
spark.eventLog.dir                      hdfs://namenode:9000/user/spark/spark3ApplicationHistory
spark.history.fs.logDirectory           hdfs://namenode:9000/user/spark/spark3ApplicationHistory

# Hive Metastore (thrift URI on spark-net)
spark.hadoop.hive.metastore.uris        thrift://hive-metastore:9083

# Laptop-safe executor defaults
spark.executor.memory                   1g
spark.executor.cores                    2
spark.driver.memory                     1g

# Reduce shuffle partitions for dev
spark.sql.shuffle.partitions            10

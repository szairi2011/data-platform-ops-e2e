# Livy server configuration
livy.server.host = 0.0.0.0
livy.server.port = 8998

# YARN master for all sessions and batches
livy.spark.master = yarn

# Interactive sessions use client mode (driver on Livy server — required for SparkMagic)
livy.spark.deploy-mode = client

# Spark and Hadoop homes
livy.server.spark.home = /opt/spark
livy.server.hadoop.home = /opt/hadoop

# Enable Hive context in interactive sessions
livy.repl.enable-hive-context = true

# Poll YARN every 500 ms for application state
livy.server.yarn.poll-interval = 500ms

# Allow user to impersonate (single-user dev cluster)
livy.impersonation.enabled = false

# Session timeout (idle)
livy.server.session.timeout = 1h
livy.server.session.state-retain.sec = 600

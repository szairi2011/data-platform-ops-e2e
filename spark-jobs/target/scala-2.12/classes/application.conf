app {
  paths {
    raw         = "hdfs:///data/raw"
    bronze      = "hdfs:///data/bronze"
    silver      = "hdfs:///data/silver"
    gold        = "hdfs:///data/gold"
    dead-letter = "hdfs:///data/dead-letter"
    jars        = "hdfs:///jars"
  }

  hive {
    database   = "gold_db"
    gold-table = "daily_summary"
  }

  silver {
    # Overridden at submission: --conf spark.dataplatform.silver.watermark=YYYY-MM-DD
    watermark-conf-key = "spark.dataplatform.silver.watermark"
    default-watermark  = "1970-01-01"
  }

  compaction {
    layer        = "silver"   # overridden at submission via --conf
    target-files = 4
  }
}

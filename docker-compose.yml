# docker-compose.yml — Thin orchestrator
# This file does NOT define services directly. It delegates to each submodule's
# own compose file via the `include:` directive (Compose v2.20+).
#
# For granular startup (laptop-safe), prefer using ops.sh:
#   ./ops.sh start yarn|airflow|governance|all
#
# To start everything at once:
#   docker compose up -d
#
# Network ownership: spark-net is OWNED here at the umbrella level.
# Each submodule declares it as external so both standalone ops.sh usage
# and umbrella `docker compose up` work without conflicts.
# ops.sh creates the network (idempotent) before starting any stack.

networks:
  spark-net:
    name: spark-net
    driver: bridge

include:
  - path: yarn-cluster/docker-compose.yml
  - path: airflow-dags-prod/docker-compose.yml
  - path: gitlab-runner/docker-compose.yml
  # data-governance/docker-compose.yml added when stack is ready
